name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Build frontend
        run: pnpm run build
        working-directory: web

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.8.1

      - name: Build backend
        run: cargo build --release

      - name: Deploy via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          sed -i "s|__DEPLOY_PATH__|${DEPLOY_PATH}|g" deploy/octopus.service

          rsync -avz --delete --mkpath \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            ./web/dist/ \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/web/"

          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT" \
            ./target/release/octopus-backend \
            ./deploy/octopus.service \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      - name: Restart service
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "${SSH_USER}@${SSH_HOST}" \
            "mkdir -p ~/.config/systemd/user && \
             cp ${DEPLOY_PATH}/octopus.service ~/.config/systemd/user/octopus.service && \
             export XDG_RUNTIME_DIR=/run/user/\$(id -u) && \
             systemctl --user daemon-reload && \
             systemctl --user enable octopus && \
             systemctl --user restart octopus"
